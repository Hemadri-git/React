<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>

    <style>
        .js-container{
            display: flex;
            justify-content: space-around;
            gap: 10rem;
        }

        div div{
            border: 1px solid red;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ProductList({ name, price, discountPrice, imgSrc }) {
            return (
                <div>

                    <img src={imgSrc} width="150" />

                    <p>{name}</p>

                    { discountPrice ? (
                        <>
                           <p><del>Price: ${price}</del></p>
                           <p> Discount Price: ${discountPrice}</p>
                        </>
                    ) : (
                        <>
                         <p>price: ${price}</p>
                        </>
                    ) };

                    <button>Add To Cart</button>
                </div>
            )
        }


        function App() {
            return (
                <>
                    <ProductList name="cotton-socks" price="10.98" discountPrice="5.45" imgSrc="/images/cotton-socks.png"/>
                    <ProductList name="tennis balls" price="1.87" imgSrc="/images/tennis-balls.png"/>
                    <ProductList name="tshirt" price="8.78" imgSrc="/images/plain-t-shirt.png" />
                </>
            )
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);

    </script>
</body>

</html>
